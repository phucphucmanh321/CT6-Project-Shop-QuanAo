<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promoDress" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#promoDress)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1000" cy="300" r="120" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Elegant dress presentation -->
  <g transform="translate(300, 80)">
    <!-- Head -->
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Neckline -->
    <path d="M -20 20 Q 0 15 20 20" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Dress body A-line -->
    <path d="M -20 25 Q -30 80 -25 150 L 25 150 Q 30 80 20 25 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
  
  <!-- Another dress design -->
  <g transform="translate(900, 80)">
    <!-- Head -->
    <circle cx="0" cy="0" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Dress with waist detail -->
    <path d="M -25 25 L -30 60 Q -35 100 -30 150 L 30 150 Q 35 100 30 60 L 25 25 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Waist belt -->
    <rect x="-35" y="58" width="70" height="6" fill="rgba(255,255,255,0.4)" rx="3"/>
  </g>
  
  <!-- Floral decoration -->
  <text x="600" y="200" font-size="60" fill="rgba(255,255,255,0.2)" text-anchor="middle">✿</text>
</svg>