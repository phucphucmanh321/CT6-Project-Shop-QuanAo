<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jacketGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666666;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="#f5f5f5"/>
  
  <!-- Collar left -->
  <path d="M 110 60 L 95 90 L 105 85 Z" fill="#333333" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Collar right -->
  <path d="M 140 60 L 155 90 L 145 85 Z" fill="#333333" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Jacket body left -->
  <path d="M 105 85 L 70 100 L 65 210 Q 65 235 85 235 L 120 235 Q 125 235 125 220 L 125 85 Z" fill="url(#jacketGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Jacket body right -->
  <path d="M 145 85 L 180 100 L 185 210 Q 185 235 165 235 L 130 235 Q 125 235 125 220 L 125 85 Z" fill="url(#jacketGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Left sleeve -->
  <path d="M 80 95 Q 40 110 35 180" fill="none" stroke="url(#jacketGradient)" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Right sleeve -->
  <path d="M 170 95 Q 210 110 215 180" fill="none" stroke="url(#jacketGradient)" stroke-width="18" stroke-linecap="round"/>
  
  <!-- Zipper -->
  <line x1="125" y1="90" x2="125" y2="200" stroke="#999999" stroke-width="2"/>
  <circle cx="125" cy="90" r="4" fill="#cccccc"/>
  
  <!-- Buttons -->
  <circle cx="105" cy="120" r="4" fill="#888888" stroke="#000000" stroke-width="1"/>
  <circle cx="145" cy="120" r="4" fill="#888888" stroke="#000000" stroke-width="1"/>
  
  <!-- Pocket flaps -->
  <rect x="75" y="150" width="20" height="15" fill="none" stroke="#333333" stroke-width="1.5" rx="2" opacity="0.7"/>
  <rect x="155" y="150" width="20" height="15" fill="none" stroke="#333333" stroke-width="1.5" rx="2" opacity="0.7"/>
</svg>