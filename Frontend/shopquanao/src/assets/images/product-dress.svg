<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dressGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#444444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666666;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="#f5f5f5"/>
  
  <!-- Neckline -->
  <path d="M 110 50 Q 125 45 140 50" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- Dress body -->
  <path d="M 110 50 L 95 80 Q 80 120 90 200 Q 95 230 125 235 Q 155 230 160 200 Q 170 120 155 80 L 140 50 Z" fill="url(#dressGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Left sleeve -->
  <path d="M 110 55 Q 85 65 75 95" fill="none" stroke="url(#dressGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Right sleeve -->
  <path d="M 140 55 Q 165 65 175 95" fill="none" stroke="url(#dressGradient)" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Waist detail -->
  <ellipse cx="125" cy="105" rx="42" ry="8" fill="none" stroke="#333333" stroke-width="1.5" opacity="0.7"/>
  
  <!-- A-line dress shape emphasis -->
  <path d="M 100 110 Q 125 130 150 110" fill="none" stroke="#555555" stroke-width="1" opacity="0.4"/>
  
  <!-- Decorative pattern -->
  <circle cx="105" cy="140" r="3" fill="#cccccc" opacity="0.5"/>
  <circle cx="125" cy="155" r="3" fill="#cccccc" opacity="0.5"/>
  <circle cx="145" cy="140" r="3" fill="#cccccc" opacity="0.5"/>
  <circle cx="115" cy="180" r="3" fill="#cccccc" opacity="0.5"/>
  <circle cx="135" cy="180" r="3" fill="#cccccc" opacity="0.5"/>
</svg>