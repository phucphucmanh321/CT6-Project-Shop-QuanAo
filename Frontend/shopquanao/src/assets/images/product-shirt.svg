<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#333333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#666666;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="#f5f5f5"/>
  
  <!-- Shirt body -->
  <path d="M 80 60 L 120 60 L 120 80 L 130 80 L 130 140 L 70 140 L 70 80 L 80 80 Z" fill="url(#shirtGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Shirt front panel -->
  <rect x="80" y="95" width="50" height="45" fill="#444444" opacity="0.8"/>
  
  <!-- Collar -->
  <path d="M 115 60 L 125 75 L 135 60 Z" fill="#555555"/>
  <path d="M 135 60 L 125 75 L 115 60 Z" fill="#444444"/>
  
  <!-- Left sleeve -->
  <rect x="50" y="80" width="35" height="50" fill="url(#shirtGradient)" stroke="#000000" stroke-width="1.5" rx="5"/>
  
  <!-- Right sleeve -->
  <rect x="165" y="80" width="35" height="50" fill="url(#shirtGradient)" stroke="#000000" stroke-width="1.5" rx="5"/>
  
  <!-- Buttons -->
  <circle cx="105" cy="105" r="3" fill="#cccccc"/>
  <circle cx="105" cy="120" r="3" fill="#cccccc"/>
  
  <!-- Pocket -->
  <rect x="95" y="100" width="15" height="12" fill="none" stroke="#333333" stroke-width="1" opacity="0.6"/>
  
  <!-- Decorative lines -->
  <line x1="100" y1="150" x2="150" y2="150" stroke="#cccccc" stroke-width="1" opacity="0.3"/>
</svg>