<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tshirtGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#444444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="#f5f5f5"/>
  
  <!-- Neckline -->
  <circle cx="125" cy="65" r="25" fill="none" stroke="#000000" stroke-width="2"/>
  
  <!-- T-shirt body -->
  <path d="M 105 85 L 80 100 L 75 220 Q 75 235 90 235 L 160 235 Q 175 235 175 220 L 170 100 L 145 85 Z" fill="url(#tshirtGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Left sleeve -->
  <rect x="40" y="85" width="65" height="40" fill="url(#tshirtGradient)" stroke="#000000" stroke-width="1.5" rx="8"/>
  
  <!-- Right sleeve -->
  <rect x="145" y="85" width="65" height="40" fill="url(#tshirtGradient)" stroke="#000000" stroke-width="1.5" rx="8"/>
  
  <!-- Collar binding -->
  <path d="M 105 85 Q 125 75 145 85" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Front pocket -->
  <rect x="105" y="130" width="40" height="35" fill="none" stroke="#333333" stroke-width="1.5" rx="2" opacity="0.6"/>
  
  <!-- Design element on chest -->
  <rect x="110" y="135" width="30" height="4" fill="#888888" rx="2"/>
  <rect x="110" y="145" width="30" height="4" fill="#888888" rx="2"/>
  
  <!-- Waist definition -->
  <path d="M 80 160 Q 125 170 170 160" fill="none" stroke="#333333" stroke-width="1" opacity="0.4"/>
</svg>