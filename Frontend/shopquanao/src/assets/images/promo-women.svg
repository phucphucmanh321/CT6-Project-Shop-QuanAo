<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promoWomen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#promoWomen)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1000" cy="300" r="120" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Women's fashion icons -->
  <g transform="translate(150, 150)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Body -->
    <path d="M -25 -20 L -30 50 L 30 50 L 25 -20 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
  
  <!-- Another women silhouette -->
  <g transform="translate(1050, 150)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Dress -->
    <path d="M -30 -20 Q -40 20 -35 50 L 35 50 Q 40 20 30 -20 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
  
  <!-- Decorative hearts -->
  <text x="600" y="200" font-size="80" fill="rgba(255,255,255,0.15)" text-anchor="middle">💗</text>
</svg>