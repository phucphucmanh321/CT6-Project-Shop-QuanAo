<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promoSummer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#promoSummer)"/>
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1050" cy="300" r="120" fill="rgba(255,255,255,0.15)"/>
  <circle cx="600" cy="400" r="100" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Sun -->
  <circle cx="100" cy="80" r="50" fill="#ffeb3b" opacity="0.8"/>
  <g stroke="#ffeb3b" stroke-width="5" stroke-linecap="round" opacity="0.7">
    <line x1="100" y1="20" x2="100" y2="0"/>
    <line x1="150" y1="30" x2="165" y2="15"/>
    <line x1="180" y1="80" x2="200" y2="80"/>
    <line x1="150" y1="130" x2="165" y2="145"/>
    <line x1="50" y1="130" x2="35" y2="145"/>
    <line x1="20" y1="80" x2="0" y2="80"/>
    <line x1="50" y1="30" x2="35" y2="15"/>
  </g>
  
  <!-- Fashion items representation -->
  <g transform="translate(900, 150)">
    <!-- Dress silhouette -->
    <path d="M 0 0 L -20 30 L -25 100 L 25 100 L 20 30 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  </g>
  
  <!-- Summer elements -->
  <circle cx="300" cy="150" r="25" fill="rgba(255,255,255,0.2)"/>
  <circle cx="350" cy="180" r="20" fill="rgba(255,255,255,0.15)"/>
</svg>