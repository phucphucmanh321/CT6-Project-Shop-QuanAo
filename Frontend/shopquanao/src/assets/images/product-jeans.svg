<svg viewBox="0 0 250 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="jeansGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="250" height="250" fill="#f5f5f5"/>
  
  <!-- Jeans waist -->
  <ellipse cx="125" cy="60" rx="40" ry="15" fill="#1a1a1a"/>
  
  <!-- Left leg -->
  <path d="M 100 75 L 95 220 Q 95 235 110 235 L 120 235 Q 125 235 125 220 L 125 75 Z" fill="url(#jeansGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Right leg -->
  <path d="M 150 75 L 155 220 Q 155 235 140 235 L 130 235 Q 125 235 125 220 L 125 75 Z" fill="url(#jeansGradient)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Belt -->
  <rect x="85" y="70" width="80" height="8" fill="#333333" stroke="#000000" stroke-width="1"/>
  
  <!-- Belt buckle -->
  <rect x="110" y="68" width="30" height="12" fill="#999999" stroke="#000000" stroke-width="1" rx="2"/>
  <rect x="115" y="70" width="20" height="8" fill="#cccccc"/>
  
  <!-- Left zipper -->
  <line x1="125" y1="78" x2="125" y2="120" stroke="#666666" stroke-width="2"/>
  <circle cx="125" cy="78" r="3" fill="#999999"/>
  
  <!-- Seam lines -->
  <line x1="100" y1="140" x2="95" y2="200" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="150" y1="140" x2="155" y2="200" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  
  <!-- Texture details -->
  <circle cx="105" cy="110" r="2" fill="#444444" opacity="0.4"/>
  <circle cx="145" cy="130" r="2" fill="#444444" opacity="0.4"/>
  <circle cx="110" cy="180" r="2" fill="#444444" opacity="0.4"/>
</svg>