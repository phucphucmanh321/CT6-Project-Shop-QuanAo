<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promoMen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#promoMen)"/>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1000" cy="300" r="120" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Men's fashion representation -->
  <g transform="translate(300, 150)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Shirt and tie -->
    <path d="M -25 -20 L -30 50 L 30 50 L 25 -20 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Tie -->
    <path d="M -5 -10 L 5 -10 L 3 20 L -3 20 Z" fill="rgba(255,255,255,0.5)"/>
  </g>
  
  <!-- Another men silhouette with jacket -->
  <g transform="translate(900, 150)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="25" fill="rgba(255,255,255,0.4)"/>
    <!-- Jacket -->
    <path d="M -30 -20 L -40 50 L 40 50 L 30 -20 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Inner shirt -->
    <path d="M -20 -10 L -25 40 L 25 40 L 20 -10 Z" fill="rgba(255,255,255,0.35)"/>
  </g>
  
  <!-- Shirt icon -->
  <text x="600" y="200" font-size="80" fill="rgba(255,255,255,0.15)" text-anchor="middle">👔</text>
</svg>