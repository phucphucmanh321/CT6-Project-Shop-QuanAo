<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="promoJeans" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#promoJeans)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="100" r="80" fill="rgba(255,255,255,0.2)"/>
  <circle cx="1000" cy="300" r="120" fill="rgba(255,255,255,0.15)"/>
  
  <!-- Jeans representation -->
  <g transform="translate(300, 100)">
    <!-- Waist -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Left leg -->
    <rect x="-25" y="20" width="18" height="150" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <!-- Right leg -->
    <rect x="7" y="20" width="18" height="150" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
  
  <!-- Another jeans view -->
  <g transform="translate(900, 100)">
    <!-- Waist -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
    <!-- Slim fit legs -->
    <path d="M -18 20 L -15 170 L -25 170 L -22 20 Z" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <path d="M 18 20 L 15 170 L 25 170 L 22 20 Z" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  </g>
  
  <!-- Denim texture detail -->
  <circle cx="600" cy="200" r="40" fill="rgba(255,255,255,0.1)"/>
</svg>