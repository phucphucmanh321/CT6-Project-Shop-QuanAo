<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="500" height="500" fill="url(#heroBg)"/>
  
  <!-- Mannequin head -->
  <circle cx="250" cy="120" r="35" fill="#666666" opacity="0.8"/>
  
  <!-- Neck -->
  <rect x="235" y="155" width="30" height="20" fill="#999999"/>
  
  <!-- Dress form body -->
  <path d="M 200 180 Q 180 220 185 280 L 315 280 Q 320 220 300 180 Z" fill="#333333" stroke="#000000" stroke-width="2"/>
  
  <!-- Left arm -->
  <g>
    <line x1="200" y1="195" x2="140" y2="240" stroke="#666666" stroke-width="8"/>
    <circle cx="135" cy="245" r="12" fill="#999999"/>
  </g>
  
  <!-- Right arm -->
  <g>
    <line x1="300" y1="195" x2="360" y2="240" stroke="#666666" stroke-width="8"/>
    <circle cx="365" cy="245" r="12" fill="#999999"/>
  </g>
  
  <!-- Left leg -->
  <line x1="215" y1="280" x2="210" y2="380" stroke="#666666" stroke-width="10"/>
  
  <!-- Right leg -->
  <line x1="285" y1="280" x2="290" y2="380" stroke="#666666" stroke-width="10"/>
  
  <!-- Left shoe -->
  <ellipse cx="210" cy="390" rx="15" ry="10" fill="#000000"/>
  
  <!-- Right shoe -->
  <ellipse cx="290" cy="390" rx="15" ry="10" fill="#000000"/>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="80" r="40" fill="#cccccc" opacity="0.3"/>
  <circle cx="420" cy="150" r="50" fill="#d0d0d0" opacity="0.3"/>
  <circle cx="80" cy="350" r="35" fill="#d9d9d9" opacity="0.3"/>
</svg>